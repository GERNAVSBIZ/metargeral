<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Relatórios METAR/SPECI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --primary-color: #0f172a;
            --primary-light: #1e293b;
            --secondary-color: #3b82f6;
            --accent-color: #06b6d4;
            --background-color: #f8fafc;
            --background-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --text-color: #1e293b;
            --text-muted: #64748b;
            --alert-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --border-radius: 16px;
            --border-radius-sm: 8px;
            --box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --box-shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6; 
            color: var(--text-color); 
            background: var(--background-gradient);
            padding: 24px;
            min-height: 100vh;
        }
        
        header { 
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%);
            color: white; padding: 32px; border-radius: var(--border-radius); 
            margin-bottom: 32px; text-align: center; box-shadow: var(--box-shadow-lg);
            position: relative; overflow: hidden;
        }
        
        header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(59, 130, 246, 0.1) 0%, rgba(6, 182, 212, 0.1) 100%);
            pointer-events: none;
        }
        
        header h1 { font-size: 2.5rem; font-weight: 700; }
        
        .historical-search-container { max-width: 1400px; margin: 0 auto; }
        
        .card { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            border-radius: var(--border-radius); padding: 24px; box-shadow: var(--box-shadow);
            border: 1px solid rgba(255, 255, 255, 0.2); transition: var(--transition);
        }
        
        .card:hover { transform: translateY(-2px); box-shadow: var(--box-shadow-lg); }
        
        .historical-search { margin-top: 32px; }
        .search-controls { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
        .search-controls input[type="date"], .search-controls input[type="month"] { padding: 10px; border: 2px solid rgba(148, 163, 184, 0.3); border-radius: var(--border-radius-sm); font-size: 1rem; }
        .search-controls textarea {
            padding: 10px;
            border: 2px solid rgba(148, 163, 184, 0.3);
            border-radius: var(--border-radius-sm);
            font-size: 1rem;
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
            width: 250px;
            height: 100px;
            resize: vertical;
        }
        .search-controls button { padding: 10px 20px; font-size: 1rem; background: var(--primary-color); color: white; border: none; border-radius: var(--border-radius-sm); cursor: pointer; transition: var(--transition); }
        .search-controls button:hover { background: var(--primary-light); }
        .search-controls button:disabled { background: var(--text-muted); cursor: not-allowed; }
        #historicalSearchStatus { margin-top: 16px; font-weight: 500; }
        .search-type-selector, .report-format-selector { margin-bottom: 16px; display: flex; gap: 16px; align-items: center; font-weight: 500;}
        .search-filters { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
        .hidden { display: none; }

        .cinda-selector {
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
        }
        .cinda-selector button {
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 2px solid var(--primary-light);
            background-color: transparent;
            color: var(--primary-light);
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }
        .cinda-selector button:hover {
            background-color: var(--primary-light);
            color: white;
        }
        .cinda-selector button.active {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }
        .cinda-selector button.clear {
            border-color: var(--text-muted);
            color: var(--text-muted);
        }
        .cinda-selector button.clear:hover {
            background-color: var(--text-muted);
            color: white;
        }

        footer { margin-top: 48px; text-align: center; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <h1>Admin - Busca de Relatórios METAR/SPECI</h1>
    </header>

    <div class="historical-search-container">
        <div class="card historical-search">
            <h3>Busca Histórica e Relatórios</h3>
            
            <div class="cinda-selector" id="cindaSelectorContainer">
                <strong>Pré-seleção:</strong>
                <button data-cinda="1">CINDACTA I</button>
                <button data-cinda="2">CINDACTA II</button>
                <button data-cinda="3">CINDACTA III</button>
                <button data-cinda="4">CINDACTA IV</button>
                <button class="clear" id="clearCindaSelectionBtn">Limpar</button>
            </div>
            
            <div class="search-type-selector">
                <strong>Tipo de Busca:</strong>
                <label><input type="radio" name="searchType" value="daily" id="radioDiario" checked> Diário</label>
                <label><input type="radio" name="searchType" value="monthly" id="radioMensal"> Mensal</label>
            </div>

             <div class="search-filters">
                <label><input type="checkbox" id="filterInconsistent"> Gerar somente com mensagens inconsistentes</label>
                <label><input type="checkbox" id="filterCor"> Ignorar mensagens corrigidas (COR)</label>
            </div>

            <div class="report-format-selector">
                <strong>Formato do Relatório:</strong>
                <label><input type="radio" name="reportFormat" value="pdf" checked> PDF</label>
                <label><input type="radio" name="reportFormat" value="csv"> CSV</label>
            </div>

            <div class="search-controls">
                <div>
                    <label for="historicalAerodromoInput">Códigos ICAO:</label>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px;">Separados por espaço, vírgula ou nova linha</p>
                    <textarea id="historicalAerodromoInput"></textarea>
                </div>
                
                <div id="dailyInputContainer">
                    <label for="historicalDateInput">Data:</label>
                    <input type="date" id="historicalDateInput">
                </div>
                
                <div id="monthlyInputContainer" class="hidden">
                    <label for="historicalMonthInput">Mês/Ano:</label>
                    <input type="month" id="historicalMonthInput">
                </div>
                
                <button id="generateHistoricalReportBtn">Gerar Relatório</button>
            </div>
            <p id="historicalSearchStatus"></p>
        </div>
    </div>

    <footer>
        <p>Sistema de Geração de Relatórios METAR/SPECI</p>
    </footer>
    
    <script>
        const CONFIG = {
            apiUrl: '/api/metaradm' 
        };

        const CINDACTA_AERODROMES = {
            '1': ['SBBH', 'SBBU', 'SBBW', 'SBGO', 'SBMK', 'SBPJ', 'SBRP', 'SBUL', 'SBUR'],
            '2': ['SBBG', 'SBCP', 'SBDN', 'SBJV', 'SBLO', 'SBME', 'SBNF', 'SBPK', 'SBPP'],
            '3': ['SBAR', 'SBIL', 'SBIZ', 'SBJP', 'SBJU', 'SBKG', 'SBMS', 'SBPB', 'SBPL', 'SBTE', 'SBUF', 'SBVT'],
            '4': ['SBAT', 'SBCJ', 'SBCZ', 'SBHT', 'SBIH', 'SBMA', 'SBMQ', 'SBSN', 'SBTF']
        };

        const elements = {
            historicalAerodromoInput: document.getElementById('historicalAerodromoInput'),
            historicalDateInput: document.getElementById('historicalDateInput'),
            historicalMonthInput: document.getElementById('historicalMonthInput'),
            generateHistoricalReportBtn: document.getElementById('generateHistoricalReportBtn'),
            historicalSearchStatus: document.getElementById('historicalSearchStatus'),
            radioDiario: document.getElementById('radioDiario'),
            radioMensal: document.getElementById('radioMensal'),
            dailyInputContainer: document.getElementById('dailyInputContainer'),
            monthlyInputContainer: document.getElementById('monthlyInputContainer'),
            filterInconsistent: document.getElementById('filterInconsistent'),
            filterCor: document.getElementById('filterCor'),
            cindaSelectorContainer: document.getElementById('cindaSelectorContainer'),
            clearCindaSelectionBtn: document.getElementById('clearCindaSelectionBtn')
        };

        document.addEventListener('DOMContentLoaded', inicializarApp);

        function inicializarApp() {
            elements.historicalDateInput.valueAsDate = new Date();
            const today = new Date();
            const year = today.getFullYear();
            const month = (today.getMonth() + 1).toString().padStart(2, '0');
            elements.historicalMonthInput.value = `${year}-${month}`;
            
            elements.radioDiario.addEventListener('change', toggleSearchType);
            elements.radioMensal.addEventListener('change', toggleSearchType);
            elements.generateHistoricalReportBtn.addEventListener('click', iniciarBuscaHistorica);
            elements.cindaSelectorContainer.addEventListener('click', handleCindaSelection);
            elements.clearCindaSelectionBtn.addEventListener('click', clearCindaSelection);
        }

        function handleCindaSelection(event) {
            const target = event.target;
            if (target.tagName !== 'BUTTON' || !target.dataset.cinda) {
                return;
            }

            const cindaId = target.dataset.cinda;
            const aerodromes = CINDACTA_AERODROMES[cindaId];

            if (aerodromes) {
                elements.historicalAerodromoInput.value = aerodromes.join('\n');
                const allCindaButtons = elements.cindaSelectorContainer.querySelectorAll('button[data-cinda]');
                allCindaButtons.forEach(btn => btn.classList.remove('active'));
                target.classList.add('active');
            }
        }

        function clearCindaSelection() {
            elements.historicalAerodromoInput.value = '';
            const allCindaButtons = elements.cindaSelectorContainer.querySelectorAll('button[data-cinda]');
            allCindaButtons.forEach(btn => btn.classList.remove('active'));
        }
        
        function toggleSearchType() {
            if (elements.radioDiario.checked) {
                elements.dailyInputContainer.classList.remove('hidden');
                elements.monthlyInputContainer.classList.add('hidden');
            } else {
                elements.dailyInputContainer.classList.add('hidden');
                elements.monthlyInputContainer.classList.remove('hidden');
            }
        }
        
        async function iniciarBuscaHistorica() {
            const icaoCodesRaw = elements.historicalAerodromoInput.value.trim();
            const icaos = icaoCodesRaw.split(/[\s,]+/).filter(Boolean).map(icao => icao.toUpperCase());

            const statusEl = elements.historicalSearchStatus;
            const buttonEl = elements.generateHistoricalReportBtn;

            if (icaos.length === 0) {
                statusEl.textContent = 'Erro: Insira pelo menos um código ICAO válido.';
                statusEl.style.color = 'var(--alert-color)';
                return;
            }

            const invalidIcaos = icaos.filter(icao => !/^[A-Z]{4}$/.test(icao));
            if (invalidIcaos.length > 0) {
                statusEl.textContent = `Erro: Códigos ICAO inválidos: ${invalidIcaos.join(', ')}.`;
                statusEl.style.color = 'var(--alert-color)';
                return;
            }

            buttonEl.disabled = true;
            buttonEl.textContent = 'Buscando...';
            statusEl.style.color = 'var(--text-muted)';
            
            let todasAsMensagens = [];
            const isDailySearch = elements.radioDiario.checked;
            
            try {
                for (const [index, icao] of icaos.entries()) {
                    statusEl.textContent = `Buscando dados para ${icao} (${index + 1} de ${icaos.length})...`;
                    let mensagensDoIcao = isDailySearch 
                        ? await buscarDadosDiarios(icao) 
                        : await buscarDadosMensais(icao, icaos.length > 1);
                    
                    mensagensDoIcao.forEach(msg => msg.icao = icao);
                    todasAsMensagens.push(...mensagensDoIcao);
                }

                let dadosFiltrados = todasAsMensagens;
                if (elements.filterCor.checked) {
                    dadosFiltrados = dadosFiltrados.filter(msg => !/^(METAR|SPECI)\sCOR/.test(msg.mens.trim()));
                }
                if (elements.filterInconsistent.checked) {
                    dadosFiltrados = dadosFiltrados.filter(msg => isMessageInconsistent(msg));
                }

                if (dadosFiltrados.length > 0) {
                    const selectedFormat = document.querySelector('input[name="reportFormat"]:checked').value;
                    statusEl.textContent = `Total de ${dadosFiltrados.length} mensagens encontradas. Gerando ${selectedFormat.toUpperCase()}...`;
                    statusEl.style.color = 'var(--success-color)';
                    
                    const dateValue = isDailySearch ? elements.historicalDateInput.value : elements.historicalMonthInput.value;
                    const reportType = isDailySearch ? 'daily' : 'monthly';

                    if (selectedFormat === 'pdf') {
                        gerarPDFHistorico(dadosFiltrados, icaos, dateValue, reportType);
                    } else {
                        gerarCSVHistorico(dadosFiltrados, icaos, dateValue, reportType);
                    }
                } else {
                    statusEl.textContent = 'Nenhuma mensagem encontrada para os aeródromos e filtros aplicados.';
                    statusEl.style.color = 'var(--warning-color)';
                }

            } catch (error) {
                console.error("Erro na busca histórica:", error);
                statusEl.textContent = `Erro ao buscar dados: ${error.message}`;
                statusEl.style.color = 'var(--alert-color)';
            } finally {
                buttonEl.disabled = false;
                buttonEl.textContent = 'Gerar Relatório';
            }
        }
        
        async function buscarDadosDiarios(icao) {
            const date = elements.historicalDateInput.value;
            if (!date) throw new Error("Data não selecionada.");

            const data_ini = date.replace(/-/g, '') + '00';
            const data_fim = date.replace(/-/g, '') + '23';
            const url = `${CONFIG.apiUrl}?localidade=${icao}&data_ini=${data_ini}&data_fim=${data_fim}`;
            
            const response = await fetch(url, { cache: 'no-store' });
            const data = await response.json();
            
            if (!response.ok) throw new Error(`[${icao}] Erro: ${data.message || response.statusText}`);
            if (!data.status && data.message && !data.message.includes("data inicial ou final")) throw new Error(`[${icao}] ${data.message}`);

            return (data.data && data.data.data) || [];
        }

        async function buscarDadosMensais(icao, isMultiSearch) {
            const monthValue = elements.historicalMonthInput.value;
            if (!monthValue) throw new Error("Mês/Ano não selecionado.");
            
            const statusEl = elements.historicalSearchStatus;
            const [year, month] = monthValue.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            let mensagensDoMes = [];

            for (let day = 1; day <= daysInMonth; day++) {
                if(isMultiSearch){
                    statusEl.textContent = `Buscando dados para ${icao} - Dia ${day}/${daysInMonth}...`;
                }

                const dayString = day.toString().padStart(2, '0');
                const monthString = month.toString().padStart(2, '0');
                const dateString = `${year}${monthString}${dayString}`;
                const data_ini = dateString + '00';
                const data_fim = dateString + '23';
                const url = `${CONFIG.apiUrl}?localidade=${icao}&data_ini=${data_ini}&data_fim=${data_fim}`;

                const response = await fetch(url, { cache: 'no-store' });
                const data = await response.json();

                if (data.status && data.data && data.data.data) {
                    mensagensDoMes.push(...data.data.data);
                }
                await new Promise(resolve => setTimeout(resolve, 150));
            }
            return mensagensDoMes;
        }

        function isMessageInconsistent(msgObject) {
            const mensText = msgObject.mens || '';
            const recepcaoInfo = msgObject.timestamp || msgObject.recebimento;
            if (!mensText || !recepcaoInfo) return false;

            const recepcaoDate = new Date((typeof recepcaoInfo === 'string' ? recepcaoInfo.replace(' ', 'T') + 'Z' : recepcaoInfo));
            if (isNaN(recepcaoDate.getTime())) return false;

            const tipo = mensText.trim().startsWith('SPECI') ? 'SPECI' : 'METAR';
            const regex = /\s(\d{2})(\d{2})(\d{2})Z\s/;
            const match = mensText.match(regex);
            
            if (!match) return false;

            const msgDay = parseInt(match[1], 10);
            const msgHour = parseInt(match[2], 10);
            const msgMinute = parseInt(match[3], 10);
            
            const recepcaoYear = recepcaoDate.getUTCFullYear();
            const recepcaoMonth = recepcaoDate.getUTCMonth(); 

            const dateCurrentMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth, msgDay, msgHour, msgMinute));
            const datePreviousMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth - 1, msgDay, msgHour, msgMinute));
            const dateNextMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth + 1, msgDay, msgHour, msgMinute));
            
            const diffCurrent = Math.abs(recepcaoDate.getTime() - dateCurrentMonth.getTime());
            const diffPrevious = Math.abs(recepcaoDate.getTime() - datePreviousMonth.getTime());
            const diffNext = Math.abs(recepcaoDate.getTime() - dateNextMonth.getTime());

            let bestMsgDate = dateCurrentMonth;
            if (diffPrevious < diffCurrent && diffPrevious < diffNext) {
                bestMsgDate = datePreviousMonth;
            } else if (diffNext < diffCurrent && diffNext < diffPrevious) {
                bestMsgDate = dateNextMonth;
            }
            
            const diffEmMinutos = (recepcaoDate.getTime() - bestMsgDate.getTime()) / (1000 * 60);

            const threshold = (tipo === 'METAR') ? 5 : 15;
            
            return diffEmMinutos > threshold;
        }
        
        function formatarDados(mensagens) {
            return mensagens.map(msg => {
                const msgTrimmed = msg.mens.trim();
                let tipo = 'METAR';
                if (msgTrimmed.startsWith('SPECI COR')) tipo = 'SPECI COR';
                else if (msgTrimmed.startsWith('SPECI')) tipo = 'SPECI';
                else if (msgTrimmed.startsWith('METAR COR')) tipo = 'METAR COR';
                
                const regex = /\s(\d{2})(\d{2})(\d{2})Z\s/;
                const match = msg.mens.match(regex);
                let horaUTC = "N/A";
                if (match) {
                    horaUTC = `${match[2]}${match[3]}Z`;
                }
                return { 
                    icao: msg.icao, 
                    mens: msg.mens, 
                    recebimento: msg.recebimento, 
                    tipo: tipo, 
                    timestamp: new Date(msg.recebimento), 
                    horaUTC: horaUTC 
                };
            }).sort((a,b) => {
                if (a.icao < b.icao) return -1;
                if (a.icao > b.icao) return 1;
                return a.timestamp - b.timestamp;
            });
        }

        // MODIFICADO: Função de geração de PDF com as novas regras
        function gerarPDFHistorico(mensagens, icaos, dateValue, type) {
            const { jsPDF } = window.jspdf;
            const isFilteredInconsistent = elements.filterInconsistent.checked;
            
            const doc = new jsPDF({ orientation: isFilteredInconsistent ? 'landscape' : 'portrait' });
            
            const { title, filename } = gerarNomesArquivo(icaos, dateValue, type, 'pdf');
            
            doc.setFontSize(16);
            doc.text(title, 14, 15);
            
            const dadosFormatados = formatarDados(mensagens);
            let tableStartY = 22; // Posição inicial da tabela

            // NOVO: Bloco para adicionar o resumo de inconsistências
            if (isFilteredInconsistent) {
                const inconsistenciasPorIcao = icaos.map(icao => {
                    const count = dadosFormatados.filter(d => d.icao === icao && isMessageInconsistent(d)).length;
                    return `${icao} (${count})`;
                });
                const summaryText = `Resumo de Inconsistências: ${inconsistenciasPorIcao.join(', ')}`;
                doc.setFontSize(9);
                doc.text(summaryText, 14, 21);
                tableStartY = 28; // Desloca a tabela para baixo
            }
            
            const tableColumn = ["Aeródromo", "Tipo", "Hora UTC Msg", "Data Recebimento", "Hora Recebimento"];
            if (isFilteredInconsistent) {
                tableColumn.push("Mensagem");
            }
            
            const tableRows = dadosFormatados.map(d => {
                const row = [d.icao, d.tipo, d.horaUTC, d.timestamp.toLocaleDateString('pt-BR'), d.timestamp.toLocaleTimeString('pt-BR')];
                if (isFilteredInconsistent) {
                    row.push(d.mens);
                }
                return row;
            });
            
            const columnStyles = {};
            if (isFilteredInconsistent) {
                columnStyles[5] = { cellWidth: 100 }; 
            }

            doc.autoTable({
                head: [tableColumn], 
                body: tableRows, 
                startY: tableStartY,
                columnStyles: columnStyles,
                didParseCell: function(data) {
                    if (data.section === 'body') {
                        const originalData = dadosFormatados[data.row.index];
                        if (isMessageInconsistent(originalData)) {
                             data.cell.styles.textColor = [239, 68, 68];
                        }
                    }
                }
            });
            
            doc.save(filename);
            elements.historicalSearchStatus.textContent = `Relatório PDF gerado com sucesso!`;
        }

        function gerarCSVHistorico(mensagens, icaos, dateValue, type) {
            const dadosFormatados = formatarDados(mensagens);
            const { filename } = gerarNomesArquivo(icaos, dateValue, type, 'csv');

            const header = ["Aerodromo", "Tipo", "Hora_UTC_Msg", "Data_Recebimento", "Hora_Recebimento", "Inconsistente", "Mensagem_Completa"];
            
            const csvRows = [header.join(',')];

            const escapeCSV = (str) => {
                if (str.includes(',') || str.includes('"') || str.includes('\n')) {
                    return `"${str.replace(/"/g, '""')}"`;
                }
                return str;
            };

            for (const d of dadosFormatados) {
                const row = [
                    d.icao,
                    d.tipo,
                    d.horaUTC,
                    d.timestamp.toLocaleDateString('pt-BR'),
                    d.timestamp.toLocaleTimeString('pt-BR'),
                    isMessageInconsistent(d) ? 'SIM' : 'NAO',
                    escapeCSV(d.mens.trim())
                ];
                csvRows.push(row.join(','));
            }

            const csvContent = csvRows.join('\n');
            const blob = new Blob([`\uFEFF${csvContent}`], { type: 'text/csv;charset=utf-8;' });

            const link = document.createElement("a");
            if (link.download !== undefined) {
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", filename);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }

            elements.historicalSearchStatus.textContent = `Relatório CSV gerado com sucesso!`;
        }
        
        // MODIFICADO: Função de nomes de arquivo com a nova regra de título
        function gerarNomesArquivo(icaos, dateValue, type, extension) {
            const isFiltered = elements.filterInconsistent.checked;
            const icaosString = icaos.join('_');
            let title, filename;
            
            const activeButton = document.querySelector('.cinda-selector button.active');
            
            if (activeButton) {
                const romanMap = { '1': 'I', '2': 'II', '3': 'III', '4': 'IV' };
                const cindaId = activeButton.dataset.cinda;
                const romanNumeral = romanMap[cindaId];
                title = `MENSAGENS AUSENTES OU INCLUÍDAS COM ATRASO - CINDACTA ${romanNumeral}`;
            }

            if (type === 'daily') {
                if (!title) { // Só define o título padrão se o título do CINDACTA não foi definido
                    const dataFormatada = new Date(dateValue.replace(/-/g, '/')).toLocaleDateString('pt-BR');
                    const isMultiIcao = icaos.length > 1;
                    title = `${isFiltered ? 'Rel. Inconsistências' : 'Rel. Diário'} - ${isMultiIcao ? 'Múltiplos Aeródromos' : icaos[0]} - ${dataFormatada}`;
                }
                filename = `relatorio_${isFiltered ? 'inconsistencias' : 'diario'}_${icaosString}_${dateValue}.${extension}`;
            } else { // monthly
                 if (!title) { // Só define o título padrão se o título do CINDACTA não foi definido
                    const [year, month] = dateValue.split('-');
                    const monthName = new Date(year, month - 1, 1).toLocaleString('pt-BR', { month: 'long' });
                    const formattedMonth = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                    const isMultiIcao = icaos.length > 1;
                    title = `${isFiltered ? 'Rel. Inconsistências' : 'Rel. Mensal'} - ${isMultiIcao ? 'Múltiplos Aeródromos' : icaos[0]} - ${formattedMonth} de ${year}`;
                }
                filename = `relatorio_${isFiltered ? 'inconsistencias' : 'mensal'}_${icaosString}_${dateValue}.${extension}`;
            }
            return { title, filename };
        }

    </script>
</body>
