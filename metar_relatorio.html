<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Relatórios METAR/SPECI</title>
    <meta name="description" content="Sistema para consulta e geração de relatórios de dados meteorológicos METAR/SPECI - NAV Brasil.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            /* Color Palette - SBIZ Aviation Theme */
            --primary: #0b3c5d;
            --primary-light: #1d5c8a;
            --primary-dark: #07253b;
            --accent: #ef5b25;
            --accent-light: #ff7a45;
            --accent-dark: #cc4210;
            
            --bg-dark: #0b0f19;
            --bg-dark-card: rgba(18, 26, 47, 0.7);
            
            --text-dark: #f8fafc;
            --text-dark-muted: #94a3b8;
            
            --border-dark: rgba(255, 255, 255, 0.08);
            
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            
            --border-radius-sm: 8px;
            --border-radius-md: 14px;
            --border-radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);

            /* Compatibility with original script variables */
            --alert-color: var(--error);
            --success-color: var(--success);
            --warning-color: var(--warning);
            --text-muted: var(--text-dark-muted);
        }
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            line-height: 1.6; 
            color: var(--text-dark); 
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Airport Decorative Circle Details */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(239, 91, 37, 0.08) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(11, 60, 93, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        
        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .card { 
            background: var(--bg-dark-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--border-radius-lg); 
            padding: 36px 32px; 
            box-shadow: var(--shadow);
            border: 1px solid var(--border-dark); 
            transition: var(--transition);
            width: 100%;
        }
        
        .card:hover { 
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.4);
        }

        /* Branding Area */
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon-wrapper {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(239, 91, 37, 0.1);
            border: 1.5px solid var(--accent);
            color: var(--accent);
            margin-bottom: 16px;
            box-shadow: 0 0 15px rgba(239, 91, 37, 0.25);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 91, 37, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 91, 37, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 91, 37, 0); }
        }

        .brand-title {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 800;
        }

        .brand-subtitle {
            font-size: 13px;
            color: var(--text-dark-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        /* Tabs System styling */
        .tabs-header {
            display: flex;
            gap: 8px;
            border-bottom: 1.5px solid var(--border-dark);
            margin-bottom: 28px;
            padding-bottom: 2px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-dark-muted);
            padding: 10px 16px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            outline: none;
        }

        .tab-btn:hover {
            color: white;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .section-title {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }
        
        .search-type-selector { 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-dark);
            border-radius: var(--border-radius-sm);
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .search-type-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-label, .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        .radio-label:hover, .checkbox-label:hover {
            color: var(--accent-light);
        }

        .radio-label input[type="radio"], .checkbox-label input[type="checkbox"] {
            accent-color: var(--accent);
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .search-filters { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: 24px; 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-dark);
            border-radius: var(--border-radius-sm);
            padding: 16px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (min-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid var(--border-dark);
            border-radius: var(--border-radius-sm);
            color: var(--text-dark);
            font-family: inherit;
            font-size: 15px;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(239, 91, 37, 0.15);
        }

        select.form-input option {
            background-color: #121a2f;
            color: var(--text-dark);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: none;
            border-radius: var(--border-radius-sm);
            color: white;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(239, 91, 37, 0.25);
            gap: 10px;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(239, 91, 37, 0.35);
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: var(--text-dark-muted);
            box-shadow: none;
        }

        .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Status Notifications */
        .notification {
            padding: 14px 16px;
            border-radius: var(--border-radius-sm);
            margin-top: 24px;
            font-size: 14px;
            line-height: 1.5;
            display: none;
            align-items: flex-start;
            gap: 12px;
            border: 1px solid transparent;
            animation: fadeIn 0.3s ease-out;
        }

        .notification.active {
            display: flex;
        }

        .notification-info {
            background: rgba(148, 163, 184, 0.1);
            border-color: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        .notification-success {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #a7f3d0;
        }

        .notification-error {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.2);
            color: #fecaca;
        }

        .notification-warning {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.2);
            color: #fef3c7;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hidden Utility */
        .hidden {
            display: none !important;
        }

        footer { 
            margin-top: 36px; 
            text-align: center; 
            color: var(--text-dark-muted); 
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Branding Header -->
            <div class="brand">
                <div class="brand-icon-wrapper">
                    <!-- SVG Lucide Plane -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(45deg);"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-1 .1-1.3.5l-.3.3c-.4.4-.4 1.1 0 1.5L9 12l-4 4H3l-1 1 3 2 2 3 1-1v-2l4-4 3.8 5.8c.4.4 1.1.4 1.5 0l.3-.3c.4-.3.6-.8.5-1.3Z"/></svg>
                </div>
                <h1 class="brand-title">NAVMANAGER</h1>
                <p class="brand-subtitle">Relatórios METAR/SPECI</p>
            </div>

            <!-- Tabs System -->
            <div class="tabs-header">
                <button class="tab-btn active" id="tabPadraoBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Relatório Geral
                </button>
                <button class="tab-btn" id="tabHorarioBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Filtro por Horário
                </button>
            </div>

            <!-- Tab 1: Relatório Geral -->
            <div id="formPadrao">
                <h3 class="section-title">Busca Histórica</h3>

                <!-- Search Type Selection -->
                <div class="search-type-selector">
                    <span class="search-type-label">Tipo de Busca:</span>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="searchType" value="daily" id="radioDiario" checked> Diário
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="searchType" value="monthly" id="radioMensal"> Mensal
                        </label>
                    </div>
                </div>

                <!-- Filters -->
                <div class="search-filters">
                    <label class="checkbox-label">
                        <input type="checkbox" id="filterInconsistent"> Gerar somente mensagens inconsistentes
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filterCor"> Ignorar mensagens corrigidas (COR)
                    </label>
                </div>

                <!-- Inputs & Controls -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="historicalAerodromoInput">Código ICAO</label>
                        <input class="form-input" type="text" id="historicalAerodromoInput" maxlength="4" placeholder="Ex: SBIZ" style="text-transform: uppercase;">
                    </div>
                    
                    <div class="form-group" id="dailyInputContainer">
                        <label class="form-label" for="historicalDateInput">Data de Busca</label>
                        <input class="form-input" type="date" id="historicalDateInput">
                    </div>
                    
                    <div class="form-group hidden" id="monthlyInputContainer">
                        <label class="form-label" for="historicalMonthInput">Mês/Ano de Busca</label>
                        <input class="form-input" type="month" id="historicalMonthInput">
                    </div>
                </div>

                <!-- Button -->
                <button class="btn" id="generateHistoricalReportBtn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </span>
                    <span id="btnText">Gerar Relatório</span>
                </button>
            </div>

            <!-- Tab 2: Filtro por Horário -->
            <div id="formHorario" class="hidden">
                <h3 class="section-title">Busca Mensal por Horário</h3>

                <!-- Filters -->
                <div class="search-filters">
                    <label class="checkbox-label">
                        <input type="checkbox" id="filterHorarioInconsistent"> Gerar somente mensagens inconsistentes
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filterHorarioCor"> Ignorar mensagens corrigidas (COR)
                    </label>
                </div>

                <!-- Inputs & Controls -->
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="horarioAerodromoInput">Código ICAO</label>
                        <input class="form-input" type="text" id="horarioAerodromoInput" maxlength="4" placeholder="Ex: SBIZ" style="text-transform: uppercase;">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="horarioMonthInput">Mês/Ano de Busca</label>
                        <input class="form-input" type="month" id="horarioMonthInput">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="horarioStartHour">Hora UTC Inicial</label>
                        <select class="form-input" id="horarioStartHour">
                            <!-- Populated via JS -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="horarioEndHour">Hora UTC Final</label>
                        <select class="form-input" id="horarioEndHour">
                            <!-- Populated via JS -->
                        </select>
                    </div>
                </div>

                <!-- Button -->
                <button class="btn" id="generateHorarioReportBtn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    </span>
                    <span id="btnHorarioText">Gerar Relatório por Horário</span>
                </button>
            </div>

            <!-- Status Box -->
            <div class="notification" id="historicalSearchStatus"></div>
        </div>
    </div>

    <footer>
        <p>NAV Brasil - Sistema de Geração de Relatórios METAR/SPECI</p>
    </footer>
    
    <script>
        const CONFIG = {
            apiUrl: '/api/metaradm' 
        };

        const elements = {
            historicalAerodromoInput: document.getElementById('historicalAerodromoInput'),
            historicalDateInput: document.getElementById('historicalDateInput'),
            historicalMonthInput: document.getElementById('historicalMonthInput'),
            generateHistoricalReportBtn: document.getElementById('generateHistoricalReportBtn'),
            historicalSearchStatus: document.getElementById('historicalSearchStatus'),
            radioDiario: document.getElementById('radioDiario'),
            radioMensal: document.getElementById('radioMensal'),
            dailyInputContainer: document.getElementById('dailyInputContainer'),
            monthlyInputContainer: document.getElementById('monthlyInputContainer'),
            filterInconsistent: document.getElementById('filterInconsistent'),
            filterCor: document.getElementById('filterCor'),
            
            // Tab elements
            tabPadraoBtn: document.getElementById('tabPadraoBtn'),
            tabHorarioBtn: document.getElementById('tabHorarioBtn'),
            formPadrao: document.getElementById('formPadrao'),
            formHorario: document.getElementById('formHorario'),
            
            // Horario Tab Form elements
            horarioAerodromoInput: document.getElementById('horarioAerodromoInput'),
            horarioMonthInput: document.getElementById('horarioMonthInput'),
            horarioStartHour: document.getElementById('horarioStartHour'),
            horarioEndHour: document.getElementById('horarioEndHour'),
            filterHorarioInconsistent: document.getElementById('filterHorarioInconsistent'),
            filterHorarioCor: document.getElementById('filterHorarioCor'),
            generateHorarioReportBtn: document.getElementById('generateHorarioReportBtn')
        };

        document.addEventListener('DOMContentLoaded', inicializarApp);

        function inicializarApp() {
            // Tab 1 Default values
            elements.historicalAerodromoInput.value = 'SBIZ';
            elements.historicalDateInput.valueAsDate = new Date();
            const today = new Date();
            const year = today.getFullYear();
            const month = (today.getMonth() + 1).toString().padStart(2, '0');
            elements.historicalMonthInput.value = `${year}-${month}`;
            
            // Tab 2 Default values
            elements.horarioAerodromoInput.value = 'SBIZ';
            elements.horarioMonthInput.value = `${year}-${month}`;
            
            popularDropdownsHorario();

            // Event Listeners
            elements.radioDiario.addEventListener('change', toggleSearchType);
            elements.radioMensal.addEventListener('change', toggleSearchType);
            elements.generateHistoricalReportBtn.addEventListener('click', iniciarBuscaHistorica);
            
            // Tabs switching logic
            elements.tabPadraoBtn.addEventListener('click', () => {
                elements.tabPadraoBtn.classList.add('active');
                elements.tabHorarioBtn.classList.remove('active');
                elements.formPadrao.classList.remove('hidden');
                elements.formHorario.classList.add('hidden');
                showStatus('');
            });

            elements.tabHorarioBtn.addEventListener('click', () => {
                elements.tabHorarioBtn.classList.add('active');
                elements.tabPadraoBtn.classList.remove('active');
                elements.formHorario.classList.remove('hidden');
                elements.formPadrao.classList.add('hidden');
                showStatus('');
            });

            elements.generateHorarioReportBtn.addEventListener('click', buscarHistoricoPorHorarioEGerarPDF);
        }

        function popularDropdownsHorario() {
            const startSelect = elements.horarioStartHour;
            const endSelect = elements.horarioEndHour;
            if (!startSelect || !endSelect) return;

            for (let h = 0; h < 24; h++) {
                const hourString = h.toString().padStart(2, '0');
                
                const optStart = document.createElement('option');
                optStart.value = h;
                optStart.textContent = `${hourString}:00 UTC`;
                if (h === 21) optStart.selected = true;
                startSelect.appendChild(optStart);

                const optEnd = document.createElement('option');
                optEnd.value = h;
                optEnd.textContent = `${hourString}:00 UTC`;
                if (h === 23) optEnd.selected = true;
                endSelect.appendChild(optEnd);
            }
        }
        
        function toggleSearchType() {
            if (elements.radioDiario.checked) {
                elements.dailyInputContainer.classList.remove('hidden');
                elements.monthlyInputContainer.classList.add('hidden');
            } else {
                elements.dailyInputContainer.classList.add('hidden');
                elements.monthlyInputContainer.classList.remove('hidden');
            }
        }

        function showStatus(text, type = 'info') {
            const statusEl = elements.historicalSearchStatus;
            
            if (!text) {
                statusEl.classList.remove('active');
                statusEl.innerHTML = '';
                return;
            }

            statusEl.classList.add('active');
            
            let iconSvg = '';
            let typeClass = 'notification-info';

            if (type === 'error') {
                typeClass = 'notification-error';
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
            } else if (type === 'success') {
                typeClass = 'notification-success';
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
            } else if (type === 'warning') {
                typeClass = 'notification-warning';
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
            } else {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink: 0;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
            }

            statusEl.className = `notification active ${typeClass}`;
            statusEl.innerHTML = `${iconSvg}<span>${text}</span>`;
        }
        
        function iniciarBuscaHistorica() {
            if (elements.radioDiario.checked) {
                buscarHistoricoDiarioEGerarPDF();
            } else {
                buscarHistoricoMensalEGerarPDF();
            }
        }

        async function buscarHistoricoDiarioEGerarPDF() {
            const icao = elements.historicalAerodromoInput.value.trim().toUpperCase();
            const date = elements.historicalDateInput.value;
            const buttonEl = elements.generateHistoricalReportBtn;
            const btnTextEl = document.getElementById('btnText');

            if (!/^[A-Z]{4}$/.test(icao) || !date) {
                showStatus('Erro: Verifique o ICAO e a data selecionada.', 'error');
                return;
            }
            
            buttonEl.disabled = true;
            if (btnTextEl) btnTextEl.textContent = 'Buscando...';
            showStatus('Buscando dados...', 'info');
            
            const data_ini = date.replace(/-/g, '') + '00';
            const data_fim = date.replace(/-/g, '') + '23';

            const url = `${CONFIG.apiUrl}?localidade=${icao}&data_ini=${data_ini}&data_fim=${data_fim}`;

            try {
                const response = await fetch(url, { cache: 'no-store' });
                const data = await response.json();
                
                if (!response.ok) throw new Error(`Erro: ${data.message || response.statusText}`);
                if (!data.status && data.message && !data.message.includes("data inicial ou final")) throw new Error(data.message);

                let dadosParaRelatorio = (data.data && data.data.data && data.data.data.length > 0) ? data.data.data : [];

                // Filtra mensagens COR apenas se o checkbox estiver marcado
                if (elements.filterCor.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => !/^(METAR|SPECI)\sCOR/.test(msg.mens.trim()));
                }

                // Filtra por inconsistência
                if (elements.filterInconsistent.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => isMessageInconsistent(msg));
                }
                
                if (dadosParaRelatorio.length > 0) {
                    showStatus(`Encontradas ${dadosParaRelatorio.length} mensagens. Gerando PDF...`, 'success');
                    gerarPDFHistorico(dadosParaRelatorio, icao, date, 'daily');
                } else {
                    const dataFormatada = new Date(date.replace(/-/g, '/')).toLocaleDateString();
                    const msgText = `Nenhuma mensagem encontrada para ${icao} na data ${dataFormatada} com os filtros aplicados.`;
                    showStatus(msgText, 'warning');
                }
            } catch (error) {
                console.error("Erro na busca diária:", error);
                showStatus(`Erro ao buscar dados: ${error.message}`, 'error');
            } finally {
                buttonEl.disabled = false;
                if (btnTextEl) btnTextEl.textContent = 'Gerar Relatório';
            }
        }
        
        async function buscarHistoricoMensalEGerarPDF() {
            const icao = elements.historicalAerodromoInput.value.trim().toUpperCase();
            const monthValue = elements.historicalMonthInput.value;
            const buttonEl = elements.generateHistoricalReportBtn;
            const btnTextEl = document.getElementById('btnText');

            if (!/^[A-Z]{4}$/.test(icao) || !monthValue) {
                showStatus('Erro: Verifique o ICAO e o Mês/Ano selecionado.', 'error');
                return;
            }
            
            buttonEl.disabled = true;
            if (btnTextEl) btnTextEl.textContent = 'Buscando...';

            const [year, month] = monthValue.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            let todasAsMensagens = [];

            try {
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayString = day.toString().padStart(2, '0');
                    const monthString = month.toString().padStart(2, '0');
                    const dateString = `${year}${monthString}${dayString}`;
                    
                    showStatus(`Buscando dados para o dia ${day} de ${daysInMonth}...`, 'info');

                    const data_ini = dateString + '00';
                    const data_fim = dateString + '23';
                    
                    const url = `${CONFIG.apiUrl}?localidade=${icao}&data_ini=${data_ini}&data_fim=${data_fim}`;

                    const response = await fetch(url, { cache: 'no-store' });
                    const data = await response.json();
                    
                    if (data.status && data.data && data.data.data && data.data.data.length > 0) {
                        todasAsMensagens.push(...data.data.data);
                    }
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                let dadosParaRelatorio = todasAsMensagens;

                // Filtra mensagens COR apenas se o checkbox estiver marcado
                if (elements.filterCor.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => !/^(METAR|SPECI)\sCOR/.test(msg.mens.trim()));
                }

                // Filtra por inconsistência
                if (elements.filterInconsistent.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => isMessageInconsistent(msg));
                }

                if (dadosParaRelatorio.length > 0) {
                    showStatus(`Total de ${dadosParaRelatorio.length} mensagens encontradas. Gerando PDF...`, 'success');
                    gerarPDFHistorico(dadosParaRelatorio, icao, monthValue, 'monthly');
                } else {
                    const monthName = new Date(year, month - 1, 1).toLocaleString('pt-BR', { month: 'long' });
                    const msgText = `Nenhuma mensagem encontrada para ${icao} em ${monthName} de ${year} com os filtros aplicados.`;
                    showStatus(msgText, 'warning');
                }

            } catch (error) {
                console.error("Erro na busca mensal:", error);
                showStatus(`Erro ao buscar dados: ${error.message}`, 'error');
            } finally {
                buttonEl.disabled = false;
                if (btnTextEl) btnTextEl.textContent = 'Gerar Relatório';
            }
        }

        async function buscarHistoricoPorHorarioEGerarPDF() {
            const icao = elements.horarioAerodromoInput.value.trim().toUpperCase();
            const monthValue = elements.horarioMonthInput.value;
            const startHour = parseInt(elements.horarioStartHour.value, 10);
            const endHour = parseInt(elements.horarioEndHour.value, 10);
            const buttonEl = elements.generateHorarioReportBtn;
            const btnTextEl = document.getElementById('btnHorarioText');

            if (!/^[A-Z]{4}$/.test(icao) || !monthValue || isNaN(startHour) || isNaN(endHour)) {
                showStatus('Erro: Verifique o ICAO, o Mês/Ano e os horários selecionados.', 'error');
                return;
            }
            
            buttonEl.disabled = true;
            if (btnTextEl) btnTextEl.textContent = 'Buscando...';

            const [year, month] = monthValue.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            let todasAsMensagens = [];

            try {
                for (let day = 1; day <= daysInMonth; day++) {
                    const dayString = day.toString().padStart(2, '0');
                    const monthString = month.toString().padStart(2, '0');
                    const dateString = `${year}${monthString}${dayString}`;
                    
                    showStatus(`Buscando dados para o dia ${day} de ${daysInMonth}...`, 'info');

                    const data_ini = dateString + '00';
                    const data_fim = dateString + '23';
                    
                    const url = `${CONFIG.apiUrl}?localidade=${icao}&data_ini=${data_ini}&data_fim=${data_fim}`;

                    const response = await fetch(url, { cache: 'no-store' });
                    const data = await response.json();
                    
                    if (data.status && data.data && data.data.data && data.data.data.length > 0) {
                        todasAsMensagens.push(...data.data.data);
                    }
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                let dadosParaRelatorio = todasAsMensagens;

                // Filtra mensagens COR apenas se o checkbox estiver marcado
                if (elements.filterHorarioCor.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => !/^(METAR|SPECI)\sCOR/.test(msg.mens.trim()));
                }

                // Filtrar por intervalo de horas UTC da mensagem
                dadosParaRelatorio = dadosParaRelatorio.filter(msg => {
                    const mensText = msg.mens || '';
                    const regex = /\s(\d{2})(\d{2})(\d{2})Z\s/;
                    const match = mensText.match(regex);
                    if (!match) return false;

                    const msgHour = parseInt(match[2], 10);
                    if (startHour <= endHour) {
                        return (msgHour >= startHour && msgHour <= endHour);
                    } else {
                        // Cruza meia-noite (ex: 23h às 01h)
                        return (msgHour >= startHour || msgHour <= endHour);
                    }
                });

                // Filtra por inconsistência se o checkbox estiver marcado
                if (elements.filterHorarioInconsistent.checked) {
                    dadosParaRelatorio = dadosParaRelatorio.filter(msg => isMessageInconsistent(msg));
                }

                if (dadosParaRelatorio.length > 0) {
                    const startStr = startHour.toString().padStart(2, '0') + 'h';
                    const endStr = endHour.toString().padStart(2, '0') + 'h';
                    showStatus(`Total de ${dadosParaRelatorio.length} mensagens encontradas no intervalo ${startStr}-${endStr}. Gerando PDF...`, 'success');
                    gerarPDFHistoricoPorHorario(dadosParaRelatorio, icao, monthValue, startHour, endHour);
                } else {
                    const monthName = new Date(year, month - 1, 1).toLocaleString('pt-BR', { month: 'long' });
                    const startStr = startHour.toString().padStart(2, '0') + 'h';
                    const endStr = endHour.toString().padStart(2, '0') + 'h';
                    const msgText = `Nenhuma mensagem encontrada para ${icao} em ${monthName} de ${year} entre ${startStr} e ${endStr} com os filtros aplicados.`;
                    showStatus(msgText, 'warning');
                }

            } catch (error) {
                console.error("Erro na busca por horário:", error);
                showStatus(`Erro ao buscar dados: ${error.message}`, 'error');
            } finally {
                buttonEl.disabled = false;
                if (btnTextEl) btnTextEl.textContent = 'Gerar Relatório por Horário';
            }
        }
        
        function isMessageInconsistent(msgObject) {
            const mensText = msgObject.mens || '';
            const recepcaoInfo = msgObject.timestamp || msgObject.recebimento;
            if (!mensText || !recepcaoInfo) return false;

            const recepcaoDate = new Date((typeof recepcaoInfo === 'string' ? recepcaoInfo.replace(' ', 'T') + 'Z' : recepcaoInfo));
            if (isNaN(recepcaoDate.getTime())) return false;
            
            const tipo = mensText.trim().startsWith('SPECI') ? 'SPECI' : 'METAR';
            const regex = /\s(\d{2})(\d{2})(\d{2})Z\s/;
            const match = mensText.match(regex);
            
            if (!match) return false;

            const msgDay = parseInt(match[1], 10);
            const msgHour = parseInt(match[2], 10);
            const msgMinute = parseInt(match[3], 10);
            
            const recepcaoYear = recepcaoDate.getUTCFullYear();
            const recepcaoMonth = recepcaoDate.getUTCMonth(); 

            const dateCurrentMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth, msgDay, msgHour, msgMinute));
            const datePreviousMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth - 1, msgDay, msgHour, msgMinute));
            const dateNextMonth = new Date(Date.UTC(recepcaoYear, recepcaoMonth + 1, msgDay, msgHour, msgMinute));
            
            const diffCurrent = Math.abs(recepcaoDate.getTime() - dateCurrentMonth.getTime());
            const diffPrevious = Math.abs(recepcaoDate.getTime() - datePreviousMonth.getTime());
            const diffNext = Math.abs(recepcaoDate.getTime() - dateNextMonth.getTime());

            let bestMsgDate = dateCurrentMonth;
            if (diffPrevious < diffCurrent && diffPrevious < diffNext) {
                bestMsgDate = datePreviousMonth;
            } else if (diffNext < diffCurrent && diffNext < diffPrevious) {
                bestMsgDate = dateNextMonth;
            }
            
            const diffEmMinutos = (recepcaoDate.getTime() - bestMsgDate.getTime()) / (1000 * 60);

            const threshold = (tipo === 'METAR') ? 5 : 15;
            
            return diffEmMinutos > threshold;
        }

        function gerarPDFHistorico(mensagens, icao, dateValue, type) {
            const { jsPDF } = window.jspdf;
            const isFiltered = elements.filterInconsistent.checked;
            
            const doc = new jsPDF({ orientation: isFiltered ? 'landscape' : 'portrait' });

            let title, filename;
            let finalY = 20;

            if (type === 'daily') {
                const dataFormatada = new Date(dateValue.replace(/-/g, '/')).toLocaleDateString('pt-BR');
                title = isFiltered ? `Relatório de Inconsistências - ${icao} - ${dataFormatada}` : `Relatório Diário - ${icao} - ${dataFormatada}`;
                filename = `relatorio_${isFiltered ? 'inconsistencias' : 'diario'}_${icao}_${dateValue}.pdf`;
            } else { // monthly
                const [year, month] = dateValue.split('-');
                const monthName = new Date(year, month - 1, 1).toLocaleString('pt-BR', { month: 'long' });
                const formattedMonth = monthName.charAt(0).toUpperCase() + monthName.slice(1);
                title = isFiltered ? `Relatório de Inconsistências - ${icao} - ${formattedMonth} de ${year}` : `Relatório Mensal - ${icao} - ${formattedMonth} de ${year}`;
                filename = `relatorio_${isFiltered ? 'inconsistencias' : 'mensal'}_${icao}_${dateValue}.pdf`;
            }
            
            doc.text(title, 14, 15);

            if (type === 'monthly') {
                let totalMetar = 0, totalSpeci = 0, inconsistentMetar = 0, inconsistentSpeci = 0;
                mensagens.forEach(msg => {
                    const isSpeci = msg.mens.trim().startsWith('SPECI');
                    const isInconsistent = isMessageInconsistent(msg);
                    if (isSpeci) {
                        totalSpeci++;
                        if (isInconsistent) inconsistentSpeci++;
                    } else {
                        totalMetar++;
                        if (isInconsistent) inconsistentMetar++;
                    }
                });
                const summaryBody = [
                    ['Total de METAR no Mês', totalMetar],
                    ['Total de SPECI no Mês', totalSpeci],
                    ['Total de METAR Inconsistente', inconsistentMetar],
                    ['Total de SPECI Inconsistente', inconsistentSpeci],
                ];
                doc.autoTable({
                    startY: finalY,
                    head: [['Estatística', 'Quantidade']],
                    body: summaryBody,
                    theme: 'grid',
                    headStyles: { fillColor: [15, 23, 42] }
                });
                finalY = doc.lastAutoTable.finalY + 10;
            }
            
            const tableColumn = ["Tipo", "Hora UTC Msg", "Data Recebimento", "Hora Recebimento"];
            if (isFiltered) {
                tableColumn.push("Mensagem");
            }
            
            const dadosFormatados = mensagens.map(msg => {
                const msgTrimmed = msg.mens.trim();
                let tipo = 'METAR';
                if (msgTrimmed.startsWith('SPECI COR')) tipo = 'SPECI COR';
                else if (msgTrimmed.startsWith('SPECI')) tipo = 'SPECI';
                else if (msgTrimmed.startsWith('METAR COR')) tipo = 'METAR COR';
                
                const regex = /\s(\d{2})(\d{2})(\d{2})Z\s/;
                const match = msg.mens.match(regex);
                let horaUTC = "N/A";
                if (match) {
                    horaUTC = `${match[2]}${match[3]}Z`;
                }
                return { mens: msg.mens, recebimento: msg.recebimento, tipo: tipo, timestamp: new Date(msg.recebimento), horaUTC: horaUTC };
            }).sort((a,b) => a.timestamp - b.timestamp);

            const tableRows = dadosFormatados.map(d => {
                const row = [d.tipo, d.horaUTC, d.timestamp.toLocaleDateString('pt-BR'), d.timestamp.toLocaleTimeString('pt-BR')];
                if (isFiltered) {
                    row.push(d.mens);
                }
                return row;
            });
            
            const columnStyles = {};
            if (isFiltered) {
                columnStyles[4] = { cellWidth: 120 };
            }

            doc.autoTable({
                head: [tableColumn], 
                body: tableRows, 
                startY: finalY,
                columnStyles: columnStyles,
                didParseCell: function(data) {
                    if (data.section === 'body') {
                        const originalData = dadosFormatados[data.row.index];
                        if (isMessageInconsistent(originalData)) {
                             data.cell.styles.textColor = [239, 68, 68];
                        }
                    }
                }
            });
            
            doc.save(filename);
            showStatus('Relatório gerado com sucesso!', 'success');
        }
